# Per-project SDLC configuration. See plugin/conventions/sdlc-yaml.md for
# the full shape.
lease_authority: origin

quality_checks:
  - bunx moon run core:build
  - bunx moon run core:typecheck
  - bunx moon run core:lint
  - bunx moon run core:test
  - bunx moon run core:package-check
  - bun run lint:deps
worktree_init:
  - bun install
  - bunx lefthook install

