# Dependabot configuration (v2).
#
# Two ecosystems on distinct cadences, so dependency and CI action pins stay
# current with low PR noise instead of drifting by hand:
#   - npm            — the JavaScript dependency tree (package.json + bun.lock),
#                      swept monthly.
#   - github-actions — the action pins in .github/workflows/*.yml, swept weekly.
#
# (Deliberate deviation from the sksizer/node-template baseline, which runs both
# weekly: the npm tree here is large and moves slowly, so a monthly sweep keeps
# PR volume down; the CI action pins stay on the template's weekly cadence.)
#
# Routine minor/patch bumps are grouped so the bulk of the churn lands as a
# handful of PRs rather than one per dependency. Major bumps stay ungrouped
# (Dependabot's default) so each one gets individual scrutiny before merge.
#
# Supply-chain hardening — each ecosystem carries a `cooldown` window, so a
# freshly-published (possibly compromised) release is never proposed until it
# has aged: 7 days for minor/patch, 30 for majors. This is defense in depth.
# The committed `bun.lock` plus `bun install --frozen-lockfile` already pin
# exactly what installs, and `bun audit` gates *known* advisories — but neither
# closes the window between a malicious release landing on the registry and the
# ecosystem noticing. The cooldown closes that window by refusing to adopt a
# release until it has survived out in the open for the aging period.
version: 2
updates:
  # JavaScript dependencies. `npm` is the Dependabot ecosystem id for the
  # JavaScript ecosystem; in this Bun workspace it maintains the committed
  # `bun.lock` (there is no separate `bun` ecosystem id — `npm` covers it).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 3
    groups:
      # Development dependencies: batch minor + patch bumps into one PR.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Production dependencies: batch minor + patch bumps into one PR.
      # Major production bumps stay ungrouped for individual review.
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions pins in .github/workflows/*.yml. All action bumps are
  # batched into a single PR per week.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      github-actions:
        patterns:
          - "*"
