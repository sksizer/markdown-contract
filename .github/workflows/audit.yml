# Dependency vulnerability audit.
#
# Scans the resolved dependency tree against the npm advisory database and
# fails the build on known-vulnerable dependencies.
#
# Blocking threshold — HIGH:
#   `bun audit --audit-level=high` exits non-zero on a high or critical
#   advisory (blocking) while tolerating low/moderate advisories (reported,
#   not blocking). The `--audit-level=high` flag is load-bearing: a bare
#   `bun audit` exits 0 even with critical vulns present, so the flag is what
#   actually gates the build.
#
# Why a dedicated workflow rather than a moon task:
#   The audit queries the npm advisory DB over the network, so it does not
#   belong in the offline, moon-cached checks (build/typecheck/coverage). It
#   ships in its own workflow file and deliberately does not touch ci.yml's
#   `moon run` task list, keeping it parallel-safe with the rest of CI.
#
# Bun-workspace note:
#   `bun audit` reads the committed `bun.lock` — the Bun-workspace equivalent
#   of the npm-era `npm audit` against `package-lock.json`.
name: Audit

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bun is the canonical dev package manager; pin matches ci.yml.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Runs the same package.json `audit` script the local gate uses:
      # `bun audit --audit-level=high` — blocks on high/critical advisories.
      - name: Audit dependencies
        run: bun run audit
