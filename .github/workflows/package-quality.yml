# Published-package hygiene (publint + are-the-types-wrong).
#
# HARD gate: runs the core:package-check moon task (publint + attw against the
# built/packed package) and FAILS the workflow on any packaging or
# type-resolution regression. No continue-on-error, and CI is NOT blanked — this
# is a real gate (unlike the report-only knip.yml, whose CI-clearing trick only
# exists to exercise a runInCI:false task). The package-check moon task is
# runInCI:true and its `deps: ['build']` rebuilds dist/ first, so attw/publint
# always lint fresh output.
#
# Why a dedicated workflow rather than the shared ci.yml `moon run` list:
#   The `bunx moon run :build :typecheck :coverage` line in ci.yml is the one
#   genuine coordination point across the concurrent M-0010 tasks (T-L77L notes
#   this). A dedicated workflow keeps that shared line untouched, so this gate
#   lands without contending on it — mirroring the sibling knip.yml / audit.yml
#   side-gate pattern.
#
# Setup mirrors ci.yml exactly (Bun-canonical: T-WKSP / D-0010 D1): Bun installs
# the workspace from bun.lock and provides the pinned moon CLI; the proto cache
# holds the moon-managed toolchains the tasks run under.
name: Package Quality

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  package-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so moon can hash inputs / detect touched files reliably.
          fetch-depth: 0

      # Bun is the canonical dev package manager; pin matches ci.yml.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the proto-managed toolchains (the pinned Node + Bun moon downloads
      # on first task run). Keyed on the toolchain pins so a version bump busts
      # it. Shares the key with ci.yml so either workflow can warm it.
      - name: Cache moon toolchain
        uses: actions/cache@v6
        with:
          path: ~/.proto
          key: ${{ runner.os }}-proto-${{ hashFiles('.moon/toolchains.yml') }}
          restore-keys: ${{ runner.os }}-proto-

      # Hard gate: run publint + attw through the moon task. moon pulls the
      # `build` dep first (fresh dist/), then runs the combined check; a non-zero
      # exit (broken exports, unresolvable .d.ts) fails the workflow and the PR.
      - name: Run package-check (publint + attw) via moon
        run: bunx moon run :package-check
