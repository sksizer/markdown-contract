# Deploy the Astro docs site (sites/docs) to GitHub Pages.
#
# ONE-TIME MANUAL PREREQUISITE (not automated here): a repo admin must set
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
# before this workflow can publish. Until that is set (and while Actions billing
# is blocked, see T-PAGE) runs will not deploy.
#
# Bun-bootstrapped and builds through moon, mirroring .github/workflows/ci.yml
# (D-0010): checkout → setup-bun → bun install → moon toolchain cache →
# `bunx moon run docs:build` (emits sites/docs/dist) → upload-pages-artifact →
# deploy-pages.

name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'sites/docs/**'
  workflow_dispatch: {}

# Least-privilege token for Pages: the deploy needs to write Pages and mint an
# OIDC token; everything else stays read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# GitHub's recommended Pages pattern: serialize deploys, but never cancel an
# in-flight one (a half-published site is worse than a queued run).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so moon can hash inputs / detect touched files reliably.
          fetch-depth: 0

      # Bun is the canonical dev package manager (T-WKSP / D-0010 D1): it installs
      # the workspace from the committed bun.lock and provides the pinned moon CLI
      # (@moonrepo/cli, hoisted to node_modules/.bin). Consistent with the CI model
      # (.github/workflows/ci.yml) — setup-bun, not setup-node/npm.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the proto-managed toolchains (the pinned Node + Bun that moon
      # downloads on first task run). Keyed on the toolchain pins so a version bump
      # busts it.
      - name: Cache moon toolchain
        uses: actions/cache@v6
        with:
          path: ~/.proto
          key: ${{ runner.os }}-proto-${{ hashFiles('.moon/toolchains.yml') }}
          restore-keys: ${{ runner.os }}-proto-

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Single task source of truth: build the docs site through moon (task def
      # lives in sites/docs/moon.yml; the `docs:build` task runs `astro build` on
      # the bun toolchain and emits sites/docs/dist).
      - name: Build docs site
        run: bunx moon run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sites/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
