# Dead-code / unused-dependency report (knip).
#
# Report-only gate: runs knip (via the core:lint-deps moon task) and surfaces
# unused files / exports / dependencies in the job log, but NEVER fails CI — the
# knip step is `continue-on-error: true`. This is the documented-baseline gate
# for the dead-code cleanup follow-up; flipping it to a hard gate (drop
# continue-on-error, add to the shared ci.yml `moon run` list, set the moon
# task's runInCI: true) is a deliberate later step, not this one.
#
# Why a dedicated workflow rather than the shared ci.yml `moon run` list:
#   knip is report-only, so it must not fail the shared build/typecheck/coverage
#   gate. The core:lint-deps moon task is runInCI: false for the same reason, so
#   it never rides `moon ci`. This dedicated job is where knip actually runs —
#   mirroring the sibling audit.yml pattern (a separate side-gate workflow).
#
# Setup mirrors ci.yml exactly (Bun-canonical: T-WKSP / D-0010 D1): Bun installs
# the workspace from bun.lock and provides the pinned moon CLI, and the proto
# cache holds the moon-managed Node toolchain the NODE-pinned :lint-deps task
# runs under.
name: Knip

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  knip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so moon can hash inputs / detect touched files reliably.
          fetch-depth: 0

      # Bun is the canonical dev package manager; pin matches ci.yml.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the proto-managed toolchains (the pinned Node + Bun moon downloads
      # on first task run). Keyed on the toolchain pins so a version bump busts
      # it. Shares the key with ci.yml so either workflow can warm it.
      - name: Cache moon toolchain
        uses: actions/cache@v6
        with:
          path: ~/.proto
          key: ${{ runner.os }}-proto-${{ hashFiles('.moon/toolchains.yml') }}
          restore-keys: ${{ runner.os }}-proto-

      # Report-only: run knip through the moon task. continue-on-error keeps a
      # finding from failing the workflow (knip exits non-zero on dead code) —
      # the findings are surfaced in this log as the baseline, nothing more.
      #
      # CI is blanked for this step only: the core:lint-deps task is
      # runInCI: false, which makes moon SKIP it once it detects a CI environment
      # (moon keys CI detection on a non-empty `CI` env var) — even for an
      # explicit `moon run`. Clearing `CI` lets this dedicated report-only job
      # still exercise the task via moon, without touching its runInCI: false
      # (which keeps it out of the shared ci.yml gate). moon is version-pinned
      # (@moonrepo/cli 2.3.5), so this behavior is stable.
      - name: Run knip (report-only)
        run: bunx moon run :lint-deps
        continue-on-error: true
        env:
          CI: ''
