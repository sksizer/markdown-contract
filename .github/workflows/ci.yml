name: CI

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so moon can hash inputs / detect touched files reliably.
          fetch-depth: 0

      # Bun is the canonical dev package manager (T-WKSP / D-0010 D1): it installs
      # the workspace from the committed bun.lock and provides the pinned moon CLI
      # (@moonrepo/cli, hoisted to node_modules/.bin). npm stays canonical for the
      # PUBLISHED artifact only (packages/core).
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the proto-managed toolchains (the pinned Node + Bun that moon
      # downloads on first task run). Keyed on the toolchain pins so a version bump
      # busts it.
      - name: Cache moon toolchain
        uses: actions/cache@v6
        with:
          path: ~/.proto
          key: ${{ runner.os }}-proto-${{ hashFiles('.moon/toolchains.yml') }}
          restore-keys: ${{ runner.os }}-proto-

      # Single task source of truth: run the suite through moon (task defs live in
      # packages/core/moon.yml). build + typecheck run on the bun toolchain;
      # :coverage runs vitest under the pinned node toolchain (the Node-compat
      # gate) and enforces the coverage thresholds in vitest.config.ts — it
      # subsumes :test, so the coverage gate rides the normal run rather than
      # doubling it. :lint is the biome ci gate (format + lint + import
      # organization, T-0MVN). lint-docs is a moon task too, but runInCI:false
      # because it validates mid-edit planning docs; see packages/core/moon.yml.
      - name: Run build, typecheck, test+coverage, and lint via moon
        run: bunx moon run :build :typecheck :coverage :lint

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: packages/core/coverage/
          if-no-files-found: ignore
