category: inference-init
title: "Scaffold and Guard: init, Inference, and Drift Checks"
examples:
  - id: INFERENCE-INIT-01
    name: "Scaffold a contract from a folder of notes"
    demonstrates: "init reads existing markdown and writes a tight-but-accepting contract plus a discoverable router, zero TypeScript."
    rank: 1
    builds_on: null
    artifact_kind: cli
    artifact: |
      # infer the tightest contract that still accepts every *.md under ./notes
      markdown-contract init ./notes
      # writes notes.contract.yaml + markdown-contract.yaml (the router) in the cwd
      # prints:
      #   init: inferred 1 contract(s); wrote 2 file(s):
      #     markdown-contract.yaml
      #     notes.contract.yaml
      #   self-check: clean (the scaffold accepts its own corpus)
    surfaces:
      - "init verb (src/cli/run.ts runInit)"
      - "inferConfig single-contract mode"
      - "mergeFiles router synthesis"
      - "post-write self-check"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/inference.cli.test.ts
      - src/declarative/infer.test.ts
      - tests/fixtures/infer/01-flat-uniform/fixture.ts
    recommend_test: null

  - id: INFERENCE-INIT-02
    name: "Read the inferred contract"
    demonstrates: "The generated YAML is a plain declarative contract — required vs optional sections, strict frontmatter, and value-ladder field types you can hand-tune."
    rank: 2
    builds_on: INFERENCE-INIT-01
    artifact_kind: yaml
    artifact: |
      # <name>.contract.yaml — the contract `init` generates, plain declarative YAML
      mcVersion: 1
      kind: contract
      frontmatter:
        strict: true               # key set is closed by construction
        fields:
          title:
            type: string           # value ladder: a free-varying value stays a bare type
      body:
        order: recognized-relative  # detectOrder: a shared partial order, not lockstep
        allowUnknown: false         # no unlisted section ever appeared
        sections:
          - section: Summary        # universal across docs → required
          - section: Context
            optional: true          # absent from some docs → optional
          - section: Decision
          - section: Notes
            optional: true
    surfaces:
      - "inferFrontmatter (strict + value ladder: const/format/enum)"
      - "inferBody (universal=required, detectOrder)"
      - "declarative contract format"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/infer.test.ts
      - tests/fixtures/infer/01-flat-uniform/fixture.ts
      - tests/fixtures/infer/02-optional-sections/fixture.ts
    recommend_test: null

  - id: INFERENCE-INIT-03
    name: "Preview without writing using --dry-run"
    demonstrates: "--dry-run prints every would-be file to stdout and writes nothing, so you can inspect the scaffold before committing it."
    rank: 3
    builds_on: INFERENCE-INIT-01
    artifact_kind: cli
    artifact: |
      markdown-contract init ./notes --dry-run
      # prints each would-be file as a `# <path>` banner + body, then writes nothing:
      #   # markdown-contract.yaml
      #   mcVersion: 1
      #   kind: config
      #   ...
      #   # notes.contract.yaml
      #   mcVersion: 1
      #   kind: contract
      #   ...
      # nothing is written to disk (exit 0)
    surfaces:
      - "init --dry-run branch"
      - "renderDryRun (per-file banners + warnings trailer)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/inference.cli.test.ts
    recommend_test: null

  - id: INFERENCE-INIT-04
    name: "Emit a corpus meta-config with --meta"
    demonstrates: "--meta cuts the tree into one contract per top-level directory plus a glob-routed markdown-contract.yaml corpus config."
    rank: 4
    builds_on: INFERENCE-INIT-01
    artifact_kind: cli
    artifact: |
      markdown-contract init ./docs --meta
      # cuts the tree at depth 1 and writes a glob-routed corpus config (first match wins):
      #   markdown-contract.yaml             (contracts registry + rules)
      #   contracts/docs.contract.yaml       (*.md — files directly in ./docs)
      #   contracts/guides.contract.yaml     (guides/**/*.md)
      #   contracts/reference.contract.yaml  (reference/**/*.md)
    surfaces:
      - "inferConfig meta mode (inferMeta)"
      - "depth-1 directory cut"
      - "emitMetaFiles split output"
      - "contracts registry + rules (first match wins)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/inference.cli.test.ts
      - src/declarative/infer.test.ts
      - tests/fixtures/infer/07-tree-depth1/fixture.ts
    recommend_test: null

  - id: INFERENCE-INIT-05
    name: "Tighten with --infer-bounds (planned — currently a no-op)"
    demonstrates: "--infer-bounds is accepted but currently a no-op: it is parsed yet never read, so it does not (yet) tighten the value ladder with numeric min/max or string pattern bounds — a planned future phase."
    rank: 5
    builds_on: INFERENCE-INIT-02
    artifact_kind: cli
    artifact: |
      markdown-contract init ./notes --infer-bounds
      # PLANNED / NO-OP. --infer-bounds is parsed (src/cli/run.ts → InferOptions.inferBounds)
      # but is NEVER READ in src/declarative/infer.ts — numeric min/max and string pattern
      # inference is a future phase. The flag is currently accepted as a no-op: the output is
      # byte-identical to a plain `init ./notes` (verified by diffing the two runs). It does
      # NOT yet add min/max or pattern bounds to the inferred schema.
    surfaces:
      - "InferOptions.inferBounds (flag parsed in src/cli/run.ts)"
      - "inferFieldSchema value ladder (min/max/pattern NOT inferred — planned future phase)"
    needs_test: "maybe"
    coverage_status: uncovered
    existing_coverage: []
    recommend_test: null

  - id: INFERENCE-INIT-06
    name: "Move the cut with --depth"
    demonstrates: "--depth N groups contracts at exactly N directories deep, warning about files stranded above a depth-2+ cut."
    rank: 6
    builds_on: INFERENCE-INIT-04
    artifact_kind: cli
    artifact: |
      markdown-contract init ./docs --meta --depth 2
      # groups one contract per directory at depth 2, e.g.
      #   contracts/api-v1.contract.yaml   (api/v1/**/*.md)
      #   contracts/web-v1.contract.yaml   (web/v1/**/*.md)
      # files between the root and the cut are stranded and reported:
      #   warning: stranded: api/overview.md sits above the --depth 2 cut and is
      #            covered by no contract; use a shallower --depth to include it
    surfaces:
      - "InferOptions.depth"
      - "inferMeta ancestorAt grouping"
      - "full-path slug naming (nameForDir)"
      - "stranded-file warnings"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/infer.test.ts
      - tests/fixtures/infer/08-tree-depth2/fixture.ts
      - tests/fixtures/infer/10-stranded-depth/fixture.ts
    recommend_test: null

  - id: INFERENCE-INIT-07
    name: "Loosen the floor with --relax"
    demonstrates: "--relax generates a permissive contract — order: none, allowUnknown: true, non-strict frontmatter, no enums — for evolving corpora."
    rank: 7
    builds_on: INFERENCE-INIT-02
    artifact_kind: cli
    artifact: |
      markdown-contract init ./notes --relax
      # loosens generation toward the permissive floor:
      #   body.order: none, body.allowUnknown: true
      #   frontmatter non-strict (the `strict: true` line is dropped)
      #   rung-6 enums relax to {type: string}   (const/format/type rungs are kept)
      # non-universal sections stay optional as usual; good while the tree is still growing
    surfaces:
      - "InferOptions.relax"
      - "inferBody (order none + allowUnknown)"
      - "inferFrontmatter (non-strict)"
      - "value ladder dropping rung-6 enums"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/infer.test.ts
      - tests/fixtures/infer/11-relax/fixture.ts
    recommend_test: null

  - id: INFERENCE-INIT-08
    name: "Inline vs split, and place with --out/--force"
    demonstrates: "--inline collapses the meta-config to one self-contained file, while --out and --force control where it lands and whether it overwrites."
    rank: 8
    builds_on: INFERENCE-INIT-04
    artifact_kind: cli
    artifact: |
      # one self-contained markdown-contract.yaml (each rule carries its contract def inline),
      # written under ./config, overwriting any existing scaffold there
      markdown-contract init ./docs --meta --inline --out ./config --force
      #   init: inferred N contract(s); wrote 1 file(s):  markdown-contract.yaml
      # without --inline: a router + contracts/<name>.contract.yaml per group
      # without --force: refuses to clobber an existing config (exit 2):
      #   markdown-contract: refusing to overwrite <path> (pass --force to overwrite)
    surfaces:
      - "InferOptions.inline (emitMetaFiles inline vs split)"
      - "--out placement"
      - "--force clobber guard"
    needs_test: "yes"
    coverage_status: partial
    existing_coverage:
      - tests/inference.cli.test.ts
      - src/declarative/infer.test.ts
    recommend_test: "[[T-IOUT-init-out-placement]]"

  - id: INFERENCE-INIT-09
    name: "Guard the tree with --check"
    demonstrates: "--check skips inference and verifies the existing scaffold still accepts the tree, exiting 0 when clean — a drift detector for CI."
    rank: 9
    builds_on: INFERENCE-INIT-01
    artifact_kind: cli
    artifact: |
      # run against the unchanged tree the scaffold was inferred from
      markdown-contract init ./notes --check
      # loads the existing markdown-contract.yaml and runs it over ./notes:
      #   check /abs/notes: clean
      # exit 0 — wire straight into the CI gate alongside `validate`
    surfaces:
      - "init --check branch (runInitCheck)"
      - "loadConfigFile + runCorpus"
      - "exit 0 clean / 1 drift"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/inference.cli.test.ts
    recommend_test: null

  - id: INFERENCE-INIT-10
    name: "Catch drift after a document changes"
    demonstrates: "Mutating a doc so it stops conforming makes the same --check fail with exit 1, closing the scaffold-to-guardrail loop."
    rank: 10
    builds_on: INFERENCE-INIT-09
    artifact_kind: cli
    artifact: |
      # add a frontmatter key the strict contract never saw, then re-check
      #   ./notes/today.md: + reviewer: alex
      markdown-contract init ./notes --check
      #   check /abs/notes: 1 error finding(s) — drifted
      # exit 1 — CI fails the build until the doc or the contract is updated
    surfaces:
      - "init --check drift path"
      - "runCorpus error-level findings (strict frontmatter unknown-key)"
      - "exit code 1 as CI signal"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/inference.cli.test.ts
    recommend_test: null
