  - id: REAL-WORLD-SCHEMAS-12
    name: "First cross-document check: dangling depends_on"
    demonstrates: "A docRule that flags a task whose depends_on names an id no task defines."
    rank: 12
    builds_on: REAL-WORLD-SCHEMAS-10
    artifact_kind: code
    artifact: |
      import { contract, sections, section, docRule, runCorpus } from "markdown-contract";
      const task = contract({
        frontmatter: z.object({ id: z.string(), depends_on: z.array(z.string()).default([]) }).strict(),
        body: sections({ allowUnknown: true }, [section("Goal")]),
        rules: [ docRule("task/depends-resolve", (doc, ctx) =>
          doc.frontmatter.depends_on.filter(d => !KNOWN_IDS.has(d)).map(d =>
            ctx.finding({ id: "task/depends-resolve", level: "error", message: `unknown dependency ${d}` }))) ],
      });
      await runCorpus({ rules: [{ include: ["docs/planning/tasks/**/*.md"], contract: task }] }, { cwd: "." });
    surfaces:
      - "contract({ rules }); docRule(id, (doc, ctx)) reading typed doc.frontmatter"
      - "runCorpus aggregating findings + exitCode (aggregation not yet fully tested — T-DRAG)"
    needs_test: "yes"
    coverage_status: partial
    existing_coverage:
      - tests/fixtures/validation/16-cross-plane-docrule.ts
      - src/cli/index.test.ts
    recommend_test: "[[T-DRAG-docrule-runcorpus-aggregation]]"

  - id: REAL-WORLD-SCHEMAS-13
    name: "Referential graph: membership and supersession"
    demonstrates: "docRules asserting a milestone's members all exist and no entity references a superseded id."
    rank: 13
    builds_on: REAL-WORLD-SCHEMAS-12
    artifact_kind: code
    artifact: |
      const milestone = contract({
        frontmatter: z.object({ id: z.string(), members: z.array(z.string()) }).strict(),
        rules: [
          docRule("milestone/members-exist", (doc, ctx) =>
            doc.frontmatter.members.filter(m => !TASK_IDS.has(m)).map(m =>
              ctx.finding({ id: "milestone/members-exist", level: "error", message: `member ${m} has no task` }))),
          docRule("decision/no-superseded-ref", (doc, ctx) =>
            doc.frontmatter.related.filter(r => SUPERSEDED.has(r)).map(r =>
              ctx.finding({ id: "decision/no-superseded-ref", level: "warn", message: `references superseded ${r}` }))),
        ],
      });
    surfaces:
      - "multiple docRule()s per contract; cross-document referential invariants"
      - "mixed error/warn finding levels"
    needs_test: "maybe"
    coverage_status: partial
    existing_coverage:
      - tests/fixtures/validation/16-cross-plane-docrule.ts
      - src/core/finding.test.ts
      - src/cli/format.test.ts
    recommend_test: "[[T-DRAG-docrule-runcorpus-aggregation]]"

  - id: REAL-WORLD-SCHEMAS-14
    name: "Scaffold and drift-check a corpus with init"
    demonstrates: "Inferring a tight contract from existing docs and re-checking the tree for drift."
    rank: 14
    builds_on: REAL-WORLD-SCHEMAS-10
    artifact_kind: cli
    artifact: |
      markdown-contract init docs/adr --out contracts --dry-run   # preview the inferred contract, write nothing
      markdown-contract init docs/adr --out contracts             # write the scaffold + a markdown-contract.yaml router
      markdown-contract init docs/adr --check                     # drift detection: nonzero exit if a doc diverged
    surfaces:
      - "CLI init --dry-run --out --check (self-check / drift)"
      - "auto-written router config (markdown-contract.yaml)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/inference.cli.test.ts
    recommend_test: null

