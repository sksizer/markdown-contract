    demonstrates: "Layering frontmatter typing onto the ADR: an enum status and a format-checked required date."
    rank: 2
    builds_on: REAL-WORLD-SCHEMAS-01
    artifact_kind: yaml
    artifact: |
      frontmatter:
        strict: true
        fields:
          status:
            enum: [proposed, accepted, superseded, deprecated]
          date:
            type: string
            format: date
      # (body: the strict Status/Context/Decision/Consequences sections from 01)
    surfaces:
      - "declarative frontmatter.fields: enum -> frontmatter/enum; format: date -> frontmatter/type"
      - "strict: true rejects unknown keys -> frontmatter/unknown-key (z.strictObject under the hood)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/07a-frontmatter-enum-and-unknown-key.ts
      - src/declarative/schema.test.ts
    recommend_test: null

