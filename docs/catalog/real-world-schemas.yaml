  - id: REAL-WORLD-SCHEMAS-10
    name: "Corpus config: route two types, first match wins"
    demonstrates: "A meta-config mapping path globs to per-type contracts so a tree validates against the right contract."
    rank: 10
    builds_on: REAL-WORLD-SCHEMAS-06
    artifact_kind: yaml
    artifact: |
      mcVersion: 1
      kind: config
      contracts:
        adr: ./contracts/adr.contract.yaml
        rfc: ./contracts/rfc.contract.yaml
      rules:
        - include: ["docs/adr/**/*.md"]
          contract: adr
        - include: ["docs/rfc/**/*.md"]
          contract: rfc
    surfaces:
      - "declarative kind: config; contracts name map; rules include globs"
      - "first-match-wins routing in the corpus runner (runCorpus)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/config.test.ts
      - src/cli/index.test.ts
      - tests/fixtures/corpus/markdown-contract.config.mjs
    recommend_test: null

