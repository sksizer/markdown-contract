  - id: REAL-WORLD-SCHEMAS-04
    name: "Validate one ADR from the CLI"
    demonstrates: "Running a single contract over one document and reading the exit code."
    rank: 4
    builds_on: REAL-WORLD-SCHEMAS-03
    artifact_kind: cli
    artifact: |
      markdown-contract validate docs/adr/0007-use-postgres.md \
        --contract contracts/adr.contract.yaml --format human
      # exit 0 = clean · 1 = error-level findings · 2 = usage/config error
      # findings are deterministically ordered by line, then col, then plane
    surfaces:
      - "CLI validate <path> --contract (config-less binding) --format human"
      - "exit 0 clean / 1 error-level findings / 2 usage/config"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/cli/index.test.ts
      - src/declarative/config.test.ts
      - src/cli/format.test.ts
    recommend_test: null

  - id: REAL-WORLD-SCHEMAS-05
    name: "Custom rule: Decision must cite an alternative"
    demonstrates: "A node-local rule() emitting a finding when a section's prose lacks a required reference."
    rank: 5
    builds_on: REAL-WORLD-SCHEMAS-03
    artifact_kind: code
    artifact: |
      import { contract, sections, section, rule } from "markdown-contract";
      const adr = contract({ body: sections({ order: "strict" }, [
        section("Decision", { rules: [ rule("adr/cites-alternative", (node, ctx) =>
          /alternativ/i.test(node.blocks.map(b => b.kind === "paragraph" ? b.text : "").join(" "))
            ? []
            : [ctx.finding({ id: "adr/cites-alternative", level: "error",
                message: "Decision must reference an alternative" })]) ] }),
      ]) });
    surfaces:
      - "programmatic contract(); section opts.rules"
      - "rule(id, fn) reading node.blocks + ctx.finding (the rules plane)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/17-node-level-custom-rule.ts
      - tests/fixtures/validation/17a-node-rule-violation-with-pos.ts
    recommend_test: null

