category: real-world-schemas
title: "Real-World Schemas: Document Templates and Cross-Document Governance"
examples:
  - id: REAL-WORLD-SCHEMAS-01
    name: "ADR: require the four sections in order"
    demonstrates: "A single document type whose body grammar pins required H2 sections in strict order."
    rank: 1
    builds_on: null
    artifact_kind: yaml
    artifact: |
      mcVersion: 1
      kind: contract
      body:
        order: strict
        allowUnknown: false
        sections:
          - section: Status
          - section: Context
          - section: Decision
          - section: Consequences
    surfaces:
      - "declarative YAML contract (kind: contract); body.order: strict; allowUnknown: false"
      - "the structure plane over sections: structure/section-missing, structure/section-order"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/05-strict-prefix-gap-tail.ts
      - tests/fixtures/validation/02-multiple-required-sequence.ts
    recommend_test: null

  - id: REAL-WORLD-SCHEMAS-02
