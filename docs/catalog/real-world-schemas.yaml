    recommend_test: null

  - id: REAL-WORLD-SCHEMAS-16
    name: "Retire an SDLC invariants.yaml prose linter onto a contract"
    status: planned
    demonstrates: "The SDLC plugin's required/forbidden-phrase, required-section and tool-ref linter becomes one declarative contract."
    rank: 16
    builds_on: REAL-WORLD-SCHEMAS-15
    artifact_kind: yaml
    artifact: |
      # invariants.yaml (a bespoke SKILL.md linter)  ->  skill.contract.yaml
      mcVersion: 1
      kind: contract
      body:
        forbids:
          - { pattern: "}scripts/", normalize: false }     # forbidden_phrases
        requires:
          - { pattern: "sdlc task close-commit" }          # required_tool_refs (anywhere)
        sections:
          - section: Output contract
            requires:
              - { pattern: "DONE pr=" }                    # required_phrases (section-scoped)
          - section: Notes                                 # required_h2_sections
    surfaces:
      - "requires: / forbids: on the body root and on section nodes (planned declarative text constraints)"
      - "the SDLC invariants.yaml linter retired onto one contract (DR-0005): required/forbidden phrases + required sections + tool-refs"
    needs_test: "on impl"
    coverage_status: uncovered
    existing_coverage: []
    recommend_test: "[[C-0009-declarative-text-constraints]] / [[D-0011-declarative-text-constraints]]"
