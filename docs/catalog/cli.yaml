category: cli
title: "CLI Quickstart: Validate from the Terminal"
examples:
  - id: CLI-01
    name: "Validate one clean file, see exit 0"
    demonstrates: "Running validate on a conforming document prints \"No findings.\" and exits 0."
    rank: 1
    builds_on: null
    artifact_kind: cli
    artifact: |
      # validate a folder of conforming docs (markdown-contract.yaml auto-discovered from the cwd)
      markdown-contract validate ./decisions
      Scanned 1 file; 1 matched across 1 contract, 0 unmatched
        decisions: 1

      No findings.
      # exit status: 0 (clean)
    surfaces:
      - "validate subcommand"
      - "auto-discovered markdown-contract.yaml"
      - "formatHuman empty case"
      - "exit code 0 (clean)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/cli/format.test.ts
      - src/cli/index.test.ts
      - tests/inference.cli.test.ts
      - src/declarative/config.test.ts
    recommend_test: null

  - id: CLI-02
    name: "Read a single human finding with line:col"
    demonstrates: "A file that breaks its contract prints one human-formatted finding with id, level, and source line."
    rank: 2
    builds_on: CLI-01
    artifact_kind: cli
    artifact: |
      # one doc is missing a required section; read the human-formatted finding with its source line
      markdown-contract validate ./decisions --contract decisions.contract.yaml
      Scanned 1 file; 1 matched, 0 unmatched

      D-9001.md:8 error structure/section-missing — required section ‘Decision’ is missing

      1 finding(s): 1 error, 0 warn, 0 report
      # exit status: 1 (error-level findings)
    surfaces:
      - "formatHuman per-finding line (path:line level id — message)"
      - "Finding {id,level,path,pos}"
      - "exit code 1 (error-level findings)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/cli/format.test.ts
      - src/cli/index.test.ts
    recommend_test: null

  - id: CLI-03
    name: "Switch to JSON output"
    demonstrates: "--format json emits the raw Finding[] array for machine parsing."
    rank: 3
    builds_on: CLI-02
    artifact_kind: cli
    artifact: |
      # same run, machine-readable: --format json emits the raw Finding[] (no run summary)
      markdown-contract validate ./decisions --contract decisions.contract.yaml --format json
      [
        {
          "id": "structure/section-missing",
          "level": "error",
          "path": "D-9001.md",
          "message": "required section ‘Decision’ is missing",
          "pos": {
            "line": 8,
            "col": 1
          }
        }
      ]
      # exit status: 1 (error-level findings)
    surfaces:
      - "--format json"
      - "formatJson (Finding[] verbatim, JSON.parse round-trips)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/cli/format.test.ts
      - src/cli/index.test.ts
    recommend_test: null

  - id: CLI-04
    name: "Emit SARIF for code scanning"
    demonstrates: "--format sarif produces a SARIF 2.1.0 log ready to upload to GitHub code scanning."
    rank: 4
    builds_on: CLI-03
    artifact_kind: cli
    artifact: |
      # same run as SARIF 2.1.0 for GitHub code scanning (no run summary)
      markdown-contract validate ./decisions --contract decisions.contract.yaml --format sarif > results.sarif
      # results.sarif:
      {
        "version": "2.1.0",
        "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
        "runs": [
          {
            "tool": {
              "driver": {
                "name": "markdown-contract",
                "rules": [
                  {
                    "id": "structure/section-missing"
                  }
                ]
              }
            },
            "results": [
              {
                "ruleId": "structure/section-missing",
                "level": "error",
                "message": {
                  "text": "required section ‘Decision’ is missing"
                },
                "locations": [
                  {
                    "physicalLocation": {
                      "artifactLocation": {
                        "uri": "D-9001.md"
                      },
                      "region": {
                        "startLine": 8
                      }
                    }
                  }
                ]
              }
            ]
          }
        ]
      }
      # SARIF level mapping: error→error, warn→warning, report→note; exit status: 1
    surfaces:
      - "--format sarif"
      - "formatSarif (SARIF 2.1.0, driver.rules, physicalLocation.region.startLine)"
      - "error→error, warn→warning, report→note"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/cli/format.test.ts
      - src/cli/index.test.ts
    recommend_test: null

  - id: CLI-05
    name: "Validate a whole directory"
    demonstrates: "Passing a directory validates every markdown file the discovered config routes, aggregating findings."
    rank: 5
    builds_on: CLI-02
    artifact_kind: cli
    artifact: |
      # validate a whole tree; findings aggregate across files, ordered by path then line
      markdown-contract validate ./planning --contract planning.contract.yaml
      Scanned 2 files; 2 matched, 0 unmatched

      notes/note.md:3 error frontmatter/unknown-key — unknown frontmatter key ‘reviewer’
      tasks/T-9001.md:4 error frontmatter/enum — frontmatter field ‘status’ must be one of ‘planning/draft’, ‘planning/proposed’, ‘planning/needs-definition’, ‘planning/backlog’, ‘open/ready’, ‘in-progress’, ‘in-progress/blocked’, ‘closed/done’, ‘closed/superseded’, ‘closed/partially-superseded’, ‘closed/obsoleted’, ‘closed/relocated’, ‘closed/no-repro’, ‘closed/wontdo’

      2 finding(s): 2 error, 0 warn, 0 report
      # exit status: 1 (error-level findings)
    surfaces:
      - "validate <dir>"
      - "runner aggregates findings across files"
      - "findings deterministically ordered by path then line"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/cli/index.test.ts
      - src/declarative/config.test.ts
      - src/runner/corpus.ts
    recommend_test: null

  - id: CLI-06
    name: "Narrow the run with --include"
    demonstrates: "--include scopes a directory run to a glob, validating only the matching subset."
    rank: 6
    builds_on: CLI-05
    artifact_kind: cli
    artifact: |
      # narrow the same run to a glob: only files matching tasks/**/*.md are validated
      markdown-contract validate ./planning --include 'tasks/**/*.md' --contract planning.contract.yaml
      Scanned 2 files; 1 matched, 1 unmatched

      tasks/T-9001.md:4 error frontmatter/enum — frontmatter field ‘status’ must be one of ‘planning/draft’, ‘planning/proposed’, ‘planning/needs-definition’, ‘planning/backlog’, ‘open/ready’, ‘in-progress’, ‘in-progress/blocked’, ‘closed/done’, ‘closed/superseded’, ‘closed/partially-superseded’, ‘closed/obsoleted’, ‘closed/relocated’, ‘closed/no-repro’, ‘closed/wontdo’

      1 finding(s): 1 error, 0 warn, 0 report
      # exit status: 1 (error-level findings)
    surfaces:
      - "--include glob (run-root-relative; --glob is its alias)"
      - "runner include filter"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/config.test.ts
    recommend_test: null

  - id: CLI-07
    name: "Carve out files with --exclude"
    demonstrates: "--exclude drops matching files from the run, here skipping archived entities."
    rank: 7
    builds_on: CLI-06
    artifact_kind: cli
    artifact: |
      # drop matching files; the failing archived doc is excluded, leaving a clean tree
      markdown-contract validate ./planning --exclude '**/archive/**' --contract planning.contract.yaml
      Scanned 2 files; 1 matched, 1 unmatched

      No findings.
      # exit status: 0 (nothing left fails)
    surfaces:
      - "--exclude glob (run-root-relative)"
      - "runner exclude filter"
      - "exit 0 when nothing left fails"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/config.test.ts
    recommend_test: null

  - id: CLI-08
    name: "Lean on auto-discovered config"
    demonstrates: "With a markdown-contract.yaml in the working dir, validate routes each glob to its contract with no flags."
    rank: 8
    builds_on: CLI-05
    artifact_kind: yaml
    artifact: |
      # markdown-contract.yaml (auto-discovered from cwd)
      mcVersion: 1
      kind: config
      contracts:
        decisions: ./contracts/decisions.contract.yaml
        tasks: ./contracts/tasks.contract.yaml
      rules:
        - include: ['decisions/**/*.md']
          contract: decisions   # first matching rule wins
        - include: ['tasks/**/*.md']
          contract: tasks
    surfaces:
      - "auto-discovery of markdown-contract.yaml"
      - "kind:config"
      - "contracts map + rules (globs→contract, first match wins)"
      - "loadConfigFile"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/config.test.ts
      - tests/inference.cli.test.ts
      - src/declarative/load.test.ts
    recommend_test: null

  - id: CLI-09
    name: "Apply one contract inline with --contract"
    demonstrates: "--contract validates a tree against a single YAML contract directly, no config file needed."
    rank: 9
    builds_on: CLI-08
    artifact_kind: cli
    artifact: |
      # apply one YAML contract to every *.md under a path — no config file needed
      markdown-contract validate ./decisions --contract contracts/decisions.contract.yaml
      Scanned 1 file; 1 matched, 0 unmatched

      No findings.
      # --contract builds a single catch-all rule (**/*.md) and cannot combine with --config; exit status: 0
    surfaces:
      - "--contract <yaml> (config-less parameterization)"
      - "buildInlineConfig single-contract catch-all rule **/*.md"
      - "cannot combine with --config"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/config.test.ts
    recommend_test: null

  - id: CLI-10
    name: "Route contracts to dirs with --contract/--path pairs"
    demonstrates: "Paired --contract and --path flags map each contract to its own directory in one run."
    rank: 10
    builds_on: CLI-09
    artifact_kind: cli
    artifact: |
      # one rule per pair: each --contract is scoped to its matching --path directory
      markdown-contract validate \
        --contract contracts/decisions.contract.yaml --path docs/planning/decisions \
        --contract contracts/tasks.contract.yaml     --path docs/planning/tasks
      # each --path/**/*.md routes to the contract it is paired with; each --contract needs a matching --path
    surfaces:
      - "paired --contract/--path"
      - "buildInlineConfig paired routing (one rule per pair)"
      - "each --contract needs a matching --path"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/config.test.ts
    recommend_test: null

  - id: CLI-11
    name: "Override discovery with --config"
    demonstrates: "--config points validate at an explicit config file instead of auto-discovering one."
    rank: 11
    builds_on: CLI-08
    artifact_kind: cli
    artifact: |
      # point validate at an explicit config file instead of auto-discovering one
      markdown-contract validate ./decisions --config ci/strict.yaml
      Scanned 1 file; 1 matched across 1 contract, 0 unmatched
        decisions: 1

      No findings.
      # ci/strict.yaml is a kind:config router; --config and --contract are mutually exclusive; exit status: 0
    surfaces:
      - "--config <file> override (.yaml/.yml/.js/.mjs)"
      - "loadConfig explicit path"
      - "mutually exclusive with --contract"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/declarative/config.test.ts
      - src/cli/index.test.ts
    recommend_test: null

  - id: CLI-12
    name: "Gate a pre-commit hook on the exit code"
    demonstrates: "The 0/1/2 exit-code contract wires validate straight into a shell gate or git hook."
    rank: 12
    builds_on: CLI-02
    artifact_kind: cli
    artifact: |
      #!/bin/sh
      # .git/hooks/pre-commit
      markdown-contract validate docs/planning || {
        echo 'contract findings present — commit blocked' >&2
        exit 1   # 0 clean, 1 error-level findings, 2 usage/config error
      }
    surfaces:
      - "exit-code contract (0 clean / 1 error-level findings / 2 usage-config error) as the shell + CI gating basis"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/cli/index.test.ts
      - src/declarative/config.test.ts
    recommend_test: null
