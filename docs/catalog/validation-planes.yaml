category: validation-planes
title: "Authoring Contracts in Code: Structure, Content, and Custom Rules"
examples:
  - id: VALIDATION-PLANES-01
    name: "Parse markdown into a DocTree"
    demonstrates: "parse(md) returns the raw DocTree of frontmatter, sections, and positions before any contract exists."
    rank: 1
    builds_on: null
    artifact_kind: code
    artifact: |
      import { parse } from "markdown-contract";

      const tree = parse("---\nid: T-1\n---\n## Summary\n\nShips today.\n");
      tree.frontmatter.data;        // { id: "T-1" }
      tree.root.sections[0].name;   // "Summary"
      tree.root.sections[0].pos;    // { line: 4, col: 1 }
      tree.root.sections[0].blocks; // [{ kind: "paragraph", text: "Ships today." }]
    surfaces:
      - "parse() -> DocTree (src/core/projection.ts)"
      - "DocTree.frontmatter / root / mdast"
      - "SectionNode.name / pos / blocks"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/core/projection.test.ts
    recommend_test: null

  - id: VALIDATION-PLANES-02
    name: "The smallest contract: one required section"
    demonstrates: "contract({body: sections([section(...)])}).validate(src) emits a single structure-plane Finding for a missing section."
    rank: 2
    builds_on: VALIDATION-PLANES-01
    artifact_kind: code
    artifact: |
      import { contract, sections, section } from "markdown-contract";

      const c = contract({ body: sections({}, [section("Summary")]) });
      const { findings } = c.validate("## Overview\n", { path: "doc.md" });
      // findings[0] = { id: "structure/section-missing", level: "error",
      //   path: "doc.md", message: "required section 'Summary' is missing" }
    surfaces:
      - "contract() / sections() / section() (src/core/grammar.ts)"
      - "Contract.validate() (src/core/validate.ts)"
      - "structure/section-missing (src/core/structure.ts)"
      - "Finding {id, level, path, message} (src/core/finding.ts)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/01-single-required-section.ts
      - tests/fixtures/validation/01a-single-section-missing.ts
    recommend_test: null

  - id: VALIDATION-PLANES-03
    name: "Constrain section order"
    demonstrates: "sections({order:'strict'}) makes out-of-order headings a positioned structure/section-order finding."
    rank: 3
    builds_on: VALIDATION-PLANES-02
    artifact_kind: code
    artifact: |
      const c = contract({ body: sections({ order: "strict" }, [
        section("Summary"),
        section("Details"),
      ]) });
      c.validate("## Details\n\n## Summary\n", { path: "doc.md" }).findings;
      // [{ id: "structure/section-order", level: "error", pos: { line: 1 }, ... }]
      // (the finding pins at the out-of-order 'Details' heading on line 1)
    surfaces:
      - "sections() LevelOpts.order: 'strict' (src/core/grammar.ts)"
      - "structure/section-order (src/core/structure.ts checkStrict)"
      - "Finding.pos pinned at the out-of-order heading"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/05a-strict-prefix-violated.ts
      - tests/fixtures/validation/04a-recognized-relative-out-of-order.ts
    recommend_test: null

  - id: VALIDATION-PLANES-04
    name: "Make a section optional"
    demonstrates: "optional(section(...)) lets a slot be absent without a finding while the rest of the order still holds."
    rank: 4
    builds_on: VALIDATION-PLANES-03
    artifact_kind: code
    artifact: |
      import { optional } from "markdown-contract";

      const c = contract({ body: sections({ order: "strict" }, [
        section("Summary"),
        optional(section("Notes")),  // may be absent
        section("Details"),
      ]) });
      // "Summary" then "Details" (no "Notes") validates clean
    surfaces:
      - "optional() / OptionalSpec (src/core/grammar.ts)"
      - "strict order with a skippable slot (src/core/structure.ts unwrap/slotsOf)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/03-optional-sections.ts
      - tests/fixtures/validation/05-strict-prefix-gap-tail.ts
    recommend_test: null

  - id: VALIDATION-PLANES-05
    name: "Allow interchangeable headings with oneOf"
    demonstrates: "oneOf([...]) accepts any one of several spellings at a single position as one logical slot."
    rank: 5
    builds_on: VALIDATION-PLANES-03
    artifact_kind: code
    artifact: |
      import { oneOf } from "markdown-contract";

      const c = contract({ body: sections({ order: "strict" }, [
        oneOf(["Summary", "Overview"]),  // either heading fills the slot
        section("Details"),
      ]) });
      // "## Overview" then "## Details" validates clean
    surfaces:
      - "oneOf() / OneOfSpec (src/core/grammar.ts)"
      - "one slot, multiple accepted names (src/core/structure.ts slotsOf)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/06-alias-sets-oneof.ts
      - tests/fixtures/validation/06a-oneof-none-present.ts
      - tests/fixtures/validation/06b-oneof-two-members-present.ts
    recommend_test: null

  - id: VALIDATION-PLANES-06
    name: "Admit unknown sections with a bounded gap"
    demonstrates: "gap({max}) permits a counted window of unrecognized sections between required ones, flagging overflow as structure/gap-count."
    rank: 6
    builds_on: VALIDATION-PLANES-03
    artifact_kind: code
    artifact: |
      import { gap } from "markdown-contract";

      const c = contract({ body: sections({ order: "strict" }, [
        section("Summary"),
        gap({ max: 2 }),     // up to 2 unknown sections here
        section("Decision"),
      ]) });
      // 3+ unknown sections between them -> structure/gap-count
    surfaces:
      - "gap() / GapSpec min/max (src/core/grammar.ts)"
      - "structure/gap-count (src/core/structure.ts checkStrict gap window)"
      - "doc.body.unknown partition (src/core/model.ts)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/05b-gap-bounds.ts
    recommend_test: null

  - id: VALIDATION-PLANES-07
    name: "Require a block kind: a table"
    demonstrates: "section(..., {content: table({columns})}) makes the structure plane require a table block of that shape inside the section."
    rank: 7
    builds_on: VALIDATION-PLANES-02
    artifact_kind: code
    artifact: |
      import { table } from "markdown-contract";

      const c = contract({ body: sections({}, [
        section("Changes", { content: table({ columns: ["File", "Kind"] }) }),
      ]) });
      // "Changes" with no block -> structure/block-missing
      // a block that is not a table -> structure/block-kind
    surfaces:
      - "table() content leaf (src/core/leaves.ts)"
      - "SectionOpts.content kind-gate (src/core/structure.ts kindGate)"
      - "structure/block-missing; structure/block-kind"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/10-table-leaf-columns-minrows.ts
      - tests/fixtures/validation/10a-table-empty-and-minrows.ts
      - tests/fixtures/validation/10b-table-missing-column.ts
    recommend_test: null

  - id: VALIDATION-PLANES-08
    name: "Require a list of checkboxes"
    demonstrates: "list({everyItem:'checkbox', minItems}) requires a list block and constrains each item, reporting offenders at their own line."
    rank: 8
    builds_on: VALIDATION-PLANES-07
    artifact_kind: code
    artifact: |
      import { list } from "markdown-contract";

      const c = contract({ body: sections({}, [
        section("Acceptance criteria", {
          content: list({ everyItem: "checkbox", minItems: 1 }),
        }),
      ]) });
      // a plain (non-checkbox) bullet -> content/list/item-kind at that item's line
    surfaces:
      - "list() leaf, everyItem: 'checkbox', minItems (src/core/leaves.ts)"
      - "content/list/item-kind per offending item (src/core/content.ts validateList)"
      - "content/list/min-items"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/12-list-leaf-checkbox-minitems.ts
      - tests/fixtures/validation/12a-non-checkbox-list-item.ts
      - tests/fixtures/validation/12b-list-below-minitems.ts
    recommend_test: null

  - id: VALIDATION-PLANES-09
    name: "Require a fenced code block in a language"
    demonstrates: "code({lang}) requires a fenced block and pins its language, separating the structural kind-gate from the content check."
    rank: 9
    builds_on: VALIDATION-PLANES-07
    artifact_kind: code
    artifact: |
      import { code } from "markdown-contract";

      const c = contract({ body: sections({}, [
        section("Example", { content: code({ lang: "ts" }) }),
      ]) });
      // no fenced block -> structure/block-missing
      // a ```js block where ```ts is required -> content/code/lang
    surfaces:
      - "code() leaf, lang pin (src/core/leaves.ts)"
      - "structure kind-gate (block-missing) vs content/code/lang split (src/core/structure.ts + content.ts)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/13-code-leaf-lang.ts
      - tests/fixtures/validation/13a-code-wrong-lang.ts
    recommend_test: null

  - id: VALIDATION-PLANES-10
    name: "Cross into content: a one-field frontmatter schema"
    demonstrates: "contract({frontmatter: z.object({...})}) runs Zod over the parsed frontmatter, line-mapping each issue to its key."
    rank: 10
    builds_on: VALIDATION-PLANES-02
    artifact_kind: code
    artifact: |
      import { z } from "zod";

      const c = contract({
        frontmatter: z.object({ id: z.string() }),
        body: sections({}, [section("Summary")]),
      });
      // frontmatter missing `id` -> frontmatter/required (document-level: an absent
      //   key has no line; lineForPath pins a *present* key's issue to its source line)
    surfaces:
      - "ContractDef.frontmatter (Zod) (src/core/grammar.ts)"
      - "frontmatter/required (src/core/content.ts matchFrontmatter)"
      - "DocTree.frontmatter.lineForPath (src/core/projection.ts)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/07-frontmatter-only-zod.ts
    recommend_test: null

  - id: VALIDATION-PLANES-11
    name: "Frontmatter enum, format, and bounds"
    demonstrates: "Zod enum/date/min refinements over frontmatter surface as positioned frontmatter-plane findings."
    rank: 11
    builds_on: VALIDATION-PLANES-10
    artifact_kind: code
    artifact: |
      const c = contract({
        frontmatter: z.strictObject({
          id: z.string().min(1),
          status: z.enum(["open", "closed"]),
          created: z.string().date(),
        }),
      });
      // status: "bogus" -> frontmatter/enum at the status line
      // an unexpected key -> frontmatter/unknown-key (strictObject)
    surfaces:
      - "z.enum() / z.string().date() / .min() over frontmatter"
      - "z.strictObject() -> frontmatter/unknown-key (src/core/content.ts matchFrontmatter)"
      - "frontmatter/enum (src/core/content.ts frontmatterIdFor)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/07a-frontmatter-enum-and-unknown-key.ts
    recommend_test: null

  - id: VALIDATION-PLANES-12
    name: "Typed table columns with a per-row constraint"
    demonstrates: "table({columns, cells, minRows}) types each named column with Zod and flags a bad cell at that row's source line."
    rank: 12
    builds_on: VALIDATION-PLANES-07
    artifact_kind: code
    artifact: |
      const c = contract({ body: sections({}, [
        section("Changes", { content: table({
          columns: ["File", "Kind"],
          cells: { Kind: z.enum(["add", "modify", "delete"]) },
          minRows: 1,
        }) }),
      ]) });
      // a row whose Kind is "tweak" -> content/table/cell at that row's line
    surfaces:
      - "table() cells / minRows (src/core/leaves.ts)"
      - "per-column Zod over each row (src/core/content.ts validateTable)"
      - "content/table/cell pinned via rowPos(i)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/11-typed-cells-enum-pattern.ts
      - tests/fixtures/validation/11a-cell-enum-violation.ts
    recommend_test: null

  - id: VALIDATION-PLANES-13
    name: "Bound a paragraph's word count"
    demonstrates: "maxWords(n) constrains a section's prose, emitting content/max-words at the paragraph's line when exceeded."
    rank: 13
    builds_on: VALIDATION-PLANES-02
    artifact_kind: code
    artifact: |
      import { maxWords } from "markdown-contract";

      const c = contract({ body: sections({}, [
        section("Summary", { content: maxWords(25) }),
      ]) });
      // a 40-word Summary paragraph -> content/max-words at its line
    surfaces:
      - "maxWords() leaf (src/core/leaves.ts)"
      - "content/max-words at the paragraph line (src/core/content.ts validateParagraph)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/09-section-content-leaf-maxwords-anchor.ts
      - tests/fixtures/validation/09a-maxwords-exceeded.ts
    recommend_test: null

  - id: VALIDATION-PLANES-14
    name: "A custom node rule with its own level"
    demonstrates: "rule(id, fn) attached via SectionOpts.rules runs on its bound section node and mints a finding at a level it chooses."
    rank: 14
    builds_on: VALIDATION-PLANES-02
    artifact_kind: code
    artifact: |
      import { rule } from "markdown-contract";

      const c = contract({ body: sections({}, [
        section("Goal", { rules: [
          rule("goal/non-empty", (node, ctx) =>
            node.blocks.length ? []
              : [ctx.finding({ id: "goal/non-empty", level: "warn",
                  message: "Goal has no body", pos: node.pos })]),
        ] }),
      ]) });
      // (Finding.fix is an optional descriptor on the finding shape for repair tools)
    surfaces:
      - "rule() / SectionOpts.rules (src/core/grammar.ts, run in src/core/structure.ts)"
      - "ctx.finding level/pos (src/core/registry.ts)"
      - "Finding.fix (optional descriptor) (src/core/finding.ts)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/17-node-level-custom-rule.ts
      - tests/fixtures/validation/17a-node-rule-violation-with-pos.ts
    recommend_test: null

  - id: VALIDATION-PLANES-15
    name: "A cross-cutting docRule over the whole doc"
    demonstrates: "docRule(id, fn) sees the typed Doc (frontmatter and body together) to enforce relationships no single plane can."
    rank: 15
    builds_on: VALIDATION-PLANES-14
    artifact_kind: code
    artifact: |
      import { docRule } from "markdown-contract";

      const c = contract({
        frontmatter: z.object({ status: z.enum(["open", "closed"]) }),
        body: sections({}, [section("Goal")]),
        rules: [
          docRule("task/closed-needs-note", (doc, ctx) =>
            doc.frontmatter.status === "closed" && !doc.body.section("Completion")
              ? [ctx.finding({ id: "task/closed-needs-note",
                  message: "closed tasks need a Completion section" })] : []),
        ],
      });
    surfaces:
      - "docRule() / ContractDef.rules (src/core/grammar.ts)"
      - "Doc.frontmatter + Doc.body.section() in one rule (src/core/model.ts)"
      - "rule plane (runDocRules in src/core/validate.ts)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - tests/fixtures/validation/16-cross-plane-docrule.ts
      - tests/fixtures/validation/16a-docrule-violation.ts
      - src/core/validate.test.ts
    recommend_test: null

  - id: VALIDATION-PLANES-16
    name: "All three planes in one deterministic order"
    demonstrates: "One validate() merges frontmatter, structure, content, and rule findings and sorts them by line, then col, then plane."
    rank: 16
    builds_on: VALIDATION-PLANES-15
    artifact_kind: code
    artifact: |
      const { findings } = c.validate(src, { path: "doc.md" });
      // sorted by line, then col, then plane:
      // [ { id: "doc/always",       level: "error" },              // no pos -> first
      //   { id: "frontmatter/enum", pos: { line: 3 } },
      //   { id: "structure/section-order", pos: { line: 6 } },
      //   { id: "content/max-words",       pos: { line: 9 } } ]
    surfaces:
      - "Contract.validate() one-pass merge (src/core/validate.ts)"
      - "ValidationResult.findings deterministic sort: line -> col -> plane (src/core/validate.ts sortFindings)"
      - "PLANE_ORDER frontmatter -> structure -> content -> text -> rule (src/core/validate.ts)"
    needs_test: "yes"
    coverage_status: covered
    existing_coverage:
      - src/core/validate.test.ts
      - tests/fixtures/validation/08a-both-planes-fail-merged.ts
    recommend_test: null

  - id: VALIDATION-PLANES-17
    name: "The same checks in code (TS-API parity)"
    status: planned
    demonstrates: "Library predicate builders give a combinator-authored contract the same text checks the YAML compiles to."
    rank: 17
    builds_on: VALIDATION-PLANES-16
    artifact_kind: code
    artifact: |
      import { contract, sections, section, requires, forbids } from "markdown-contract";
      // (planned) predicate builders — the same checks the requires:/forbids: YAML compiles to
      const c = contract({
        body: sections({}, [
          section("Output contract", { rules: [requires([{ pattern: "DONE pr=" }])] }),
        ]),
        rules: [forbids([{ pattern: "}scripts/", normalize: false }])],   // document-level
      });
      // same text/requires + text/forbids findings as the YAML form
    surfaces:
      - "TS-API parity: requires() / forbids() / textRule() builders (src/core/text-constraints.ts) compiling to rule / docRule"
      - "text/requires + text/forbids findings (exact API named at implementation)"
    needs_test: "on impl"
    coverage_status: uncovered
    existing_coverage:
      - tests/fixtures/validation/17-node-level-custom-rule.ts
    recommend_test: "[[C-0009-declarative-text-constraints]] / [[D-0011-declarative-text-constraints]]"
