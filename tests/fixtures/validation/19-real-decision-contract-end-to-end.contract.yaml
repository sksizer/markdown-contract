mcVersion: 1
kind: contract
# fixture: v19 — Real Decision contract end-to-end  (provenance: 19-real-decision-contract-end-to-end.ts)

frontmatter:
  strict: true
  fields:
    id:
      type: string
      pattern: '^D-[0-9A-Z]{4}$'
    status:
      enum:
        - open/proposed
        - open/accepted
        - closed/superseded
        - closed/deprecated
    title:
      type: string
      min: 1
    related:
      type: array
      of:
        type: string
      default: []

body:
  order: recognized-relative
  allowUnknown: true
  sections:
    - section: Summary
      anchor: summary
      content:
        maxWords: 120
    - section: Context
    - section: Decision
      children:
        order: strict
        allowUnknown: true
        sections:
          - section: Components
            content:
              table:
                columns:
                  - '#'
                  - Component
                  - Resolution
                minRows: 1
    - section: Why
      optional: true
    - section: Options considered
      optional: true
      children:
        order: none
        allowUnknown: true
        sections:
          - gap: {}
    - section: Consequences
      optional: true
    - section: Out of scope
      optional: true
    - section: Notes
      optional: true
