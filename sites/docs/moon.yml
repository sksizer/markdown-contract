# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
#
# The `docs` project (mapped to 'sites/docs' in .moon/workspace.yml) — the Astro +
# Starlight documentation site (M-0006, D-0010). A workspace sibling of the
# published library (packages/core); never published to npm. The example-catalog
# pages and the landing are GENERATED from docs/catalog/*.yaml at the repo root
# by scripts/generate.ts (T-SITE); the site publishes to Cloudflare Pages
# (see sites/README.md).

layer: 'application'
language: 'typescript'

tasks:
  # `bun run build` (= bun run generate && astro build) → regenerates the catalog
  # pages from docs/catalog/*.yaml, then emits the static site to dist/. Runs on
  # the bun toolchain; `bun run` puts node_modules/.bin on PATH so the astro bin
  # resolves. dist/ is the declared output, so a no-change re-run is a cache hit.
  build:
    command: 'bun run build'
    toolchain: 'bun'
    inputs:
      # content.config.ts lives at src/content.config.ts, so src/**/* covers it.
      # (The generated pages under src/content/docs/ are gitignored and rebuilt
      # by the generate step; the catalog YAML and the generator are the real
      # inputs that must invalidate the cache.)
      - 'src/**/*'
      - 'public/**/*'
      - 'scripts/**/*'
      - 'astro.config.mjs'
      - 'tsconfig.json'
      - 'package.json'
      # the catalog data lives at the REPO root (workspace-relative input)
      - '/docs/catalog/*.yaml'
    outputs:
      - 'dist'

