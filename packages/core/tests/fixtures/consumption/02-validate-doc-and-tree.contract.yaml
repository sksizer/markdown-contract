mcVersion: 1
kind: contract
# fixture: c02 — validate() → findings + doc + tree  (provenance: 02-validate-doc-and-tree.ts)

frontmatter:
  strict: true
  fields:
    id:
      type: string
      pattern: '^D-[0-9A-Z]{4}$'
    status:
      enum:
        - open/proposed
        - open/accepted
        - closed/superseded
    title:
      type: string
      min: 1

body:
  order: none
  allowUnknown: true
  sections:
    - section: Summary
    - section: Context
