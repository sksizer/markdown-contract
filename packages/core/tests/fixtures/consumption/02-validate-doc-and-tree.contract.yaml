mcVersion: 2
kind: contract
# fixture: c02 — validate() → findings + doc + tree  (provenance: 02-validate-doc-and-tree.ts)

frontmatter:
  type: object
  required: [ id, status, title ]
  additionalProperties: false
  properties:
    id:
      type: string
      pattern: '^D-[0-9A-Z]{4}$'
    status:
      enum:
        - open/proposed
        - open/accepted
        - closed/superseded
    title:
      type: string
      minLength: 1

body:
  order: none
  additionalSections: true
  sections:
    - section: Summary
    - section: Context
