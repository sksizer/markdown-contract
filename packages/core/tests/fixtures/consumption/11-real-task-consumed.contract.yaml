mcVersion: 1
kind: contract
# fixture: c11 — Real Task consumed end-to-end  (provenance: 11-real-task-consumed.ts)

frontmatter:
  strict: true
  fields:
    id:
      type: string
      pattern: '^T-[0-9A-Z]{4}$'
    type:
      const: task
    status:
      enum: [open/ready, in-progress/active, closed/done]
    title:
      type: string
      min: 1
    tags:
      type: array
      of:
        type: string
      default: []
    impact:
      enum: [low, medium, high]
    complexity:
      enum: [small, medium, large]

body:
  order: recognized-relative
  allowUnknown: true
  sections:
    - oneOf: [Goal, Goal / Problem statement]
    - section: Today
      optional: true
    - section: Files to touch
      optional: true
      content:
        table:
          columns: [Location, Kind, Change]
          cells:
            Kind:
              enum: [new, modify, delete]
    - section: Acceptance criteria
      content:
        list:
          everyItem: checkbox
          minItems: 1
    - section: Post-mortem
      optional: true
      children:
        order: strict
        allowUnknown: false
        sections:
          - section: Acceptance criteria coverage
          - section: What worked
          - section: Friction and automation gaps

# GAP: docRule("task/post-mortem-when-worked") — cross-plane doc rule (custom function) is not expressible in v1; rule() and docRule() are deferred
