mcVersion: 2
kind: contract
# fixture: v19b — Decision body alias (Recommendation for Decision)  (provenance: 19b-real-decision-alias-recommendation.ts)

frontmatter:
  type: object
  required: [ id, status, title, related ]
  additionalProperties: false
  properties:
    id:
      type: string
      pattern: '^D-[0-9A-Z]{4}$'
    status:
      enum:
        - open/proposed
        - open/accepted
        - closed/superseded
    title:
      type: string
      minLength: 1
    related:
      type: array
      items:
        type: string
      default: []

body:
  order: recognized-relative
  additionalSections: true
  sections:
    - section: Summary
      anchor: summary
      content:
        maxWords: 120
    - section: Context
      minContains: 0
      maxContains: 1
    - section: Options considered
      minContains: 0
      maxContains: 1
      order: none
      additionalSections: true
      sections:
        - gap: {}
    - oneOf:
        - Decision
        - Recommendation
        - Conclusion
        - Resolution
    - section: Consequences
      minContains: 0
      maxContains: 1
    - section: Notes
      minContains: 0
      maxContains: 1
