kind: contract
# fixture: v07 — Frontmatter only (Zod)  (provenance: 07-frontmatter-only-zod.ts)

frontmatter:
  type: object
  required: [ id, status, title ]
  additionalProperties: false
  properties:
    id:
      type: string
      pattern: '^D-[0-9A-Z]{4}$'
    status:
      enum:
        - open/proposed
        - open/accepted
        - closed/superseded
    title:
      type: string
      minLength: 1
