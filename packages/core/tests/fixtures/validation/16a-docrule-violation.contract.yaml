mcVersion: 2
kind: contract
# fixture: v16a — docRule violation fires  (provenance: 16a-docrule-violation.ts)

frontmatter:
  type: object
  required: [ id, status, title ]
  additionalProperties: false
  properties:
    id:
      type: string
      pattern: '^T-[0-9A-Z]{4}$'
    status:
      enum:
        - open/ready
        - in-progress/active
        - closed/done
        - closed/dropped
    title:
      type: string
      minLength: 1

body:
  order: recognized-relative
  additionalSections: true
  sections:
    - oneOf:
        - Goal
        - Goal / Problem statement
    - section: Acceptance criteria
      content:
        list:
          ordered: false
          items: checkbox
          minItems: 1
    - section: Post-mortem
      minContains: 0
      maxContains: 1
      order: strict
      additionalSections: false
      sections:
        - section: Acceptance criteria coverage
        - section: What worked
        - section: Friction and automation gaps

