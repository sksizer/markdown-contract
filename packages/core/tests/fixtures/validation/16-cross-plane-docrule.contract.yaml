frontmatter:
  type: object
  required: [ id, status, title ]
  additionalProperties: false
  properties:
    id:
      type: string
      pattern: '^T-[0-9A-Z]{4}$'
    status:
      enum:
        - open/ready
        - open/blocked
        - closed/done
        - closed/dropped
    title:
      type: string
      minLength: 1

body:
  order: recognized-relative
  additionalSections: true
  sections:
    - oneOf:
        - Goal
        - Goal / Problem statement
    - section: Post-mortem
      minContains: 0
      maxContains: 1
      order: strict
      additionalSections: false
      sections:
        - section: Acceptance criteria coverage
        - section: What worked
        - section: Friction and automation gaps

