mcVersion: 1
kind: contract
# fixture: v16 — Cross-plane docRule  (provenance: 16-cross-plane-docrule.ts)

frontmatter:
  strict: true
  fields:
    id:
      type: string
      pattern: '^T-[0-9A-Z]{4}$'
    status:
      enum:
        - open/ready
        - open/blocked
        - closed/done
        - closed/dropped
    title:
      type: string
      min: 1

body:
  order: recognized-relative
  allowUnknown: true
  sections:
    - oneOf:
        - Goal
        - Goal / Problem statement
    - section: Post-mortem
      optional: true
      children:
        order: strict
        allowUnknown: false
        sections:
          - section: Acceptance criteria coverage
          - section: What worked
          - section: Friction and automation gaps

# GAP: docRule("task/post-mortem-when-worked") — cross-plane docRule with custom function; rule() and docRule() are not expressible in v1
