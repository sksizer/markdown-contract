mcVersion: 1
kind: contract
# fixture: v08 — Unified frontmatter + body in one pass  (provenance: 08-frontmatter-plus-body-one-pass.ts)

frontmatter:
  strict: true
  fields:
    id:
      type: string
      pattern: '^D-[0-9A-Z]{4}$'
    status:
      enum:
        - open/proposed
        - open/accepted
        - closed/superseded
    title:
      type: string
      min: 1

body:
  order: none
  allowUnknown: true
  sections:
    - section: Summary
    - section: Context
