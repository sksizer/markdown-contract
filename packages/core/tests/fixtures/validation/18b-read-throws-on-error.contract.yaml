mcVersion: 2
kind: contract
# fixture: v18b — read() throws on error-level findings  (provenance: 18b-read-throws-on-error.ts)

frontmatter:
  type: object
  required: [ id, status, title, related ]
  additionalProperties: false
  properties:
    id:
      type: string
      pattern: '^D-[0-9A-Z]{4}$'
    status:
      enum: [ "open/proposed", "open/accepted", "closed/superseded" ]
    title:
      type: string
      minLength: 1
    related:
      type: array
      items:
        type: string
      default: []

body:
  order: recognized-relative
  additionalSections: true
  sections:
    - section: Summary
      anchor: summary
      content:
        maxWords: 120
    - section: Context
    - section: Decision
    - section: Notes
      minContains: 0
      maxContains: 1
