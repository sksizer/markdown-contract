mcVersion: 1
kind: contract
# fixture: v18 — OOM consumption: typed rows, byAnchor, dual-key  (provenance: 18-oom-consumption-typed-views.ts)

frontmatter:
  strict: true
  fields:
    id:
      type: string
      pattern: '^T-[0-9A-Z]{4}$'
    status:
      enum:
        - open/ready
        - in-progress/active
        - closed/done

body:
  order: recognized-relative
  allowUnknown: true
  sections:
    - section: Files to touch
      content:
        table:
          columns:
            - Location
            - Kind
            - Change
          cells:
            Kind:
              enum:
                - new
                - modify
                - delete
