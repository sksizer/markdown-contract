# Contract for SDLC driver docs (docs/planning/drivers/DR-*.md).
mcVersion: 2
kind: contract

frontmatter:
  type: object
  required: [ type, id, title, status, created ]
  properties:
    type: { const: driver }
    id: { type: string, pattern: '^DR-\d{4}$' }
    title: { type: string, minLength: 1 }
    status: { type: string, pattern: '^[a-z-]+/[a-z-]+$' }
    created: { type: string, format: date }

body:
  order: none
  additionalSections: true
  sections:
    - section: Statement
    - section: Who/what it affects
    - section: Evidence
    - section: Toward resolution
