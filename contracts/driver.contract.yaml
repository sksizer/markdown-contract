# Contract for SDLC driver docs (docs/planning/drivers/DR-*.md).
mcVersion: 1
kind: contract

frontmatter:
  fields:
    type: { const: driver }
    id: { type: string, pattern: '^DR-\d{4}$' }
    title: { type: string, min: 1 }
    status: { type: string, pattern: '^[a-z-]+/[a-z-]+$' }
    created: { type: string, format: date }

body:
  order: none
  allowUnknown: true
  sections:
    - section: Statement
    - section: Who/what it affects
    - section: Evidence
    - section: Toward resolution
