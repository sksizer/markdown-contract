# Contract for SDLC decision docs (docs/planning/decisions/D-*.md).
mcVersion: 2
kind: contract

frontmatter:
  type: object
  required: [ type, id, title, status, created ]
  properties:
    type: { const: decision }
    id: { type: string, pattern: '^D-\d{4}$' }
    title: { type: string, minLength: 1 }
    status: { type: string, pattern: '^[a-z-]+/[a-z-]+$' }
    created: { type: string, format: date }

body:
  order: none
  additionalSections: true
  sections:
    - section: Summary
    - section: Context
    - section: Decision
    - section: Why
    - section: Consequences
    - section: References
      requires:
        - regex: '\[\[[^\]]+\]\]'
          note: "every decision's References section must cite at least one related entity as a [[wikilink]]"
