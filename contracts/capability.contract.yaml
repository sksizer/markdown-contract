# Contract for SDLC capability docs (docs/planning/capabilities/C-*.md).
mcVersion: 2
kind: contract

frontmatter:
  # Non-strict: declare the fields we care about; the rich SDLC frontmatter
  # (schema_version, kind, parent_key, contains, related, tags, …) is allowed through.
  type: object
  required: [ type, id, title, status, created ]
  properties:
    type: { const: capability }
    id: { type: string, pattern: '^C-\d{4}$' }
    title: { type: string, minLength: 1 }
    status: { type: string, pattern: '^[a-z-]+/[a-z-]+$' }
    created: { type: string, format: date }

body:
  order: none
  additionalSections: true
  sections:
    - section: Summary
    - section: Statement
    - section: What it provides
    - section: Inputs
    - section: Outputs
    - section: Hook points
    - section: Underlying implementation
    - section: Notes
