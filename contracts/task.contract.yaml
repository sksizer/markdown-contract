# Contract for SDLC task docs (docs/planning/tasks/T-*.md).
mcVersion: 1
kind: contract

frontmatter:
  fields:
    type: { const: task }
    id: { type: string, pattern: '^T-[0-9A-Z]{4}$' }
    # Canonical task lifecycle, mirrored from the SDLC plugin schema
    # (lib/model/entities/task/schema.ts). Four majors: planning/<stage>,
    # open/<stage>, in-progress[/blocked], closed/<reason>. Note `in-progress`
    # is a valid BARE status — the old `^[a-z-]+/[a-z-]+$` pattern wrongly
    # required a slash and rejected it.
    status:
      enum:
        - planning/draft
        - planning/proposed
        - planning/needs-definition
        - planning/backlog
        - open/ready
        - in-progress
        - in-progress/blocked
        - closed/done
        - closed/superseded
        - closed/partially-superseded
        - closed/obsoleted
        - closed/relocated
        - closed/no-repro
        - closed/wontdo
    created: { type: string, format: date }

body:
  order: none
  allowUnknown: true
  sections:
    - section: Goal
    - section: Today
    - section: Proposed
    - section: Approach
    - section: Files to touch
    - section: Acceptance criteria
    - section: Out of scope
    - section: Dependencies
