# Contract for SDLC product docs (docs/planning/products/PR-*.md).
mcVersion: 2
kind: contract

frontmatter:
  type: object
  required: [ type, id, title, status, created ]
  properties:
    type: { const: product }
    id: { type: string, pattern: '^PR-\d{4}$' }
    title: { type: string, minLength: 1 }
    status: { type: string, pattern: '^[a-z-]+/[a-z-]+$' }
    created: { type: string, format: date }

body:
  order: none
  additionalSections: true
  sections:
    - section: Summary
    - section: What it is
    - section: Boundary
    - section: Drivers & goals
    - section: Status
    - section: References
