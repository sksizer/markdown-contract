# yaml-language-server: $schema=https://moonrepo.dev/schemas/toolchain.json
#
# Toolchain pins. moon v2's WASM toolchain plugins are *runtime version managers*
# only: both the `node` and `bun` plugins have `install_dependencies`,
# `parse_lock`, and `locate_dependencies_root` disabled (see `moon toolchain info
# <id>`), so enabling them pins the runtimes WITHOUT moon ever managing a
# lockfile. Dependencies are installed with `bun install` (T-WKSP / D-0010 D1):
# Bun is the canonical dev package manager and bun.lock is committed. npm stays
# canonical for the PUBLISHED artifact only (packages/core), not the dev PM.

# Bun runs build + typecheck (T-WKSP): the moon `bun` toolchain launches those
# tasks, and it is also the runtime for the future `bun build --compile`
# single-executable matrix (D-0012). Pin a concrete version so every machine and
# CI runner resolves the identical runtime.
bun:
  version: '1.3.14'

# Node runs the test/coverage gate: vitest executes under Node, exercising the
# runtime-neutral published library on real Node. Pinned to 22.12.0 — the floor
# the Astro docs site (sites/docs) requires. The published library keeps a broader
# engines.node ">=20": raising engines to ">=22" makes proto try to auto-provision
# the newest Node (not the pinned one) for the bun-toolchain tasks and fail, so the
# engines floor stays put. Concrete pin so every machine/CI runner resolves the
# identical runtime.
node:
  version: '22.12.0'
