# The desktop app's Tauri v2 shell crate (D-0018 §D1). A workspace member of the
# root Cargo.toml; edition/license/repository inherit from [workspace.package].
#
# The service/model layer is generated by the full ontogen pipeline (D-0018 §D4):
# build.rs turns the annotated entities in src/schema/ into SeaORM entities +
# conversions, DTOs, the CRUD store, the API layer, the Tauri IPC + Axum HTTP
# transports, and the TypeScript bindings under ../app/bindings/.
[package]
name = "markdown-contract-desktop"
version = "0.1.0"
description = "Tauri v2 shell for the markdown-contract desktop app"
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
# The `_lib` suffix keeps the lib name distinct from the bin name — the collision
# breaks Windows builds, see https://github.com/rust-lang/cargo/issues/8519.
name = "markdown_contract_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
# The Axum HTTP transport (D-0018 §D4's daemon-convergence seam): the SAME
# generated service surface the IPC commands expose, mountable over loopback
# HTTP the way the Bun daemon's API is. Off by default — the desktop binary
# opts in when it grows the resident-daemon role.
daemon = ["dep:axum", "tokio/net"]

[build-dependencies]
# ontogen is not published on crates.io (checked 2026-07-09: the sparse index
# 404s for ontogen/ontogen-macros/ontogen-core), so per D-0018 the dependency
# is the git repo pinned to a rev (v0.2.2's HEAD) rather than a version req.
ontogen = { git = "https://github.com/sksizer/rust-ontogen", rev = "81af0e941d2ab2cc80ee1170838b3172a70dc3fa" }
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { workspace = true }
serde_json = { workspace = true }
# Generated persistence: SeaORM over SQLite (scan history — the layer D-0012 deferred).
sea-orm = { version = "1", features = ["sqlx-sqlite", "runtime-tokio-rustls"] }
tokio = { version = "1", features = ["sync"] }
thiserror = "2"
# The generated DTOs derive specta::Type + schemars::JsonSchema (iron-log parity).
specta = { version = "=2.0.0-rc.23", features = ["derive", "function"] }
schemars = "0.8"
# RFC 3339 timestamps for scan orchestration (started_at / finished_at).
time = { version = "0.3", features = ["formatting"] }
# Same pin as the build-dep: the #[derive(OntologyEntity)] / #[ontology(...)]
# annotations the pipeline parses, plus the #[stateless] / #[ontogen(rename)]
# passthrough attrs on custom API fns.
ontogen-macros = { git = "https://github.com/sksizer/rust-ontogen", rev = "81af0e941d2ab2cc80ee1170838b3172a70dc3fa" }
axum = { version = "0.8", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
