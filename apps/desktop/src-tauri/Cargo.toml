# The desktop app's Tauri v2 shell crate (D-0018 §D1). A workspace member of the
# root Cargo.toml; edition/license/repository inherit from [workspace.package].
#
# The service/model layer is generated by the full ontogen pipeline (D-0018 §D4):
# build.rs turns the annotated entities in src/schema/ into SeaORM entities +
# conversions, DTOs, the CRUD store, the API layer, the Tauri IPC + Axum HTTP
# transports, and the TypeScript bindings under ../app/bindings/.
[package]
name = "markdown-contract-desktop"
version = "0.1.0"
description = "Tauri v2 shell for the markdown-contract desktop app"
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
# The `_lib` suffix keeps the lib name distinct from the bin name — the collision
# breaks Windows builds, see https://github.com/rust-lang/cargo/issues/8519.
name = "markdown_contract_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
# The Axum HTTP transport (D-0018 §D4's daemon-convergence seam): the SAME
# generated service surface the IPC commands expose, mountable over loopback
# HTTP the way the Bun daemon's API is. Off by default — the desktop binary
# opts in when it grows the resident-daemon role.
daemon = ["dep:axum", "tokio/net"]

[build-dependencies]
# ontogen is not published on crates.io (checked 2026-07-09: the sparse index
# 404s for ontogen/ontogen-macros/ontogen-core), so per D-0018 the dependency
# is the git repo pinned to a rev (v0.2.2's HEAD) rather than a version req.
ontogen = { git = "https://github.com/sksizer/rust-ontogen", rev = "81af0e941d2ab2cc80ee1170838b3172a70dc3fa" }
tauri-build = { version = "2", features = [] }

[dependencies]
# The matched Rust engine (D-0018 §D2): declarative config/contract loading +
# the native corpus runner behind the ScanEngine seam (src/engine/native.rs),
# and the `Finding` interchange shape the CLI fallback's JSON parses into.
markdown-contract-engine = { path = "../../../crates/markdown-contract-engine" }
# `tray-icon` for the resident system tray (D-0018 §D5); `image-png` so the
# bundled PNG app icon decodes into the tray's `Image`.
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-opener = "2"
# Desktop notifications on scan status transitions (D-0018 §D5).
tauri-plugin-notification = "2"
serde = { workspace = true }
serde_json = { workspace = true }
# Generated persistence: SeaORM over SQLite (scan history — the layer D-0012 deferred).
sea-orm = { version = "1", features = ["sqlx-sqlite", "runtime-tokio-rustls"] }
# `time` for the watcher debounce + scheduler sleeps; `rt` for spawn_blocking
# around the blocking opener detection; `macros` for tokio::select in tests.
tokio = { version = "1", features = ["sync", "time", "rt", "macros"] }
thiserror = "2"
# Scan-on-change (D-0018 §D5): recursive fs watcher per vault, mirroring the
# Bun daemon's watcher semantics (apps/web/src/daemon/watcher.ts).
notify = "8"
# Scheduled scans (D-0018 §D5): cron parsing + next-occurrence math. croner is
# the parser D-0018 names; chrono is its time vocabulary (clock only — no
# oldtime/wasmbind baggage).
croner = "3"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
# "Open in …" (D-0018 §D5): installed-app detection + launch strategies
# (Obsidian URI scheme aware). Published on crates.io as of 0.4 — preferred
# over the git rev. NOTE: its optional `specta` feature pins =2.0.0-rc.22,
# which conflicts with this crate's rc.23 pin, so the feature stays off and
# the wire DTOs (schema::openers) are hand-owned.
path-opener = "0.4"
# The generated DTOs derive specta::Type + schemars::JsonSchema (iron-log parity).
specta = { version = "=2.0.0-rc.23", features = ["derive", "function"] }
schemars = "0.8"
# RFC 3339 timestamps for scan orchestration (started_at / finished_at).
time = { version = "0.3", features = ["formatting"] }
# Same pin as the build-dep: the #[derive(OntologyEntity)] / #[ontology(...)]
# annotations the pipeline parses, plus the #[stateless] / #[ontogen(rename)]
# passthrough attrs on custom API fns.
ontogen-macros = { git = "https://github.com/sksizer/rust-ontogen", rev = "81af0e941d2ab2cc80ee1170838b3172a70dc3fa" }
# 0.7, not 0.8: the ontogen-generated router (api/transport/http/generated.rs,
# rev-pinned + DO-NOT-EDIT) emits axum-0.7-style `:id` path captures, which 0.8
# rejects at router-build time (panics on `serve`). The generator targets 0.7,
# so the dep tracks it until the pinned ontogen rev emits `{id}` captures.
axum = { version = "0.7", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }

# The standalone HTTP host for the generated ontogen contract (D-0019 Option 2).
# Gated on `daemon` so the default (Tauri-only) build never pulls in the Axum
# server; `required-features` makes `cargo build` skip it unless asked.
[[bin]]
name = "mc-daemon"
path = "src/bin/daemon.rs"
required-features = ["daemon"]
