# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
#
# The `docs` project (mapped to 'apps/docs' in .moon/workspace.yml) — the Astro +
# Starlight documentation site (M-0006, D-0010). A workspace sibling of the
# published library (packages/core); never published to npm. This is the shell:
# an empty-but-wired content collection and declared-but-empty sidebar IA. The
# landing/IA content lands in T-SHEL, the GitHub Pages deploy in T-PAGE.

layer: 'application'
language: 'typescript'

tasks:
  # `bun run build` (= astro build) → emits the static site to dist/. Runs on the
  # bun toolchain; `bun run` puts node_modules/.bin on PATH so the astro bin
  # resolves. dist/ is the declared output, so a no-change re-run is a cache hit.
  build:
    command: 'bun run build'
    toolchain: 'bun'
    inputs:
      # content.config.ts lives at src/content.config.ts, so src/**/* covers it.
      - 'src/**/*'
      - 'public/**/*'
      - 'astro.config.mjs'
      - 'tsconfig.json'
      - 'package.json'
    outputs:
      - 'dist'
