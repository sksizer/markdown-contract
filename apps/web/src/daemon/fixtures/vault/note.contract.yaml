# A tiny note contract: a `title` frontmatter string and a required `Summary` section.
# `good.md` satisfies both; `bad.md` omits the Summary section, yielding exactly one
# `structure/section-missing` error — the finding the peer test pins.
mcVersion: 2
kind: contract

frontmatter:
  type: object
  required: [ title ]
  properties:
    title:
      type: string
      minLength: 1

body:
  order: none
  additionalSections: true
  sections:
    - section: Summary
